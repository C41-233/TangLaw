  "srcText": "【疏】议曰：夫三才肇位，万象斯分。禀气含灵，人为称首。莫不凭黎元而树司宰，因政教而施刑法。其有情恣庸愚，识沈愆戾，大则乱其区宇，小则睽其品式，不立制度，则未之前闻。故曰：“以刑止刑，以杀止杀。”刑罚不可弛于国，笞捶不得废于家。时遇浇淳，用有众寡。于是结绳启信，以往黜刑，书契可征，疏而不漏。周建三典，刑有异等。自晋、宋、齐、梁、陈、魏、周、齐、隋，法简于古，而政有于时。隋则律令、格、式并行。皇朝贞观之初，命裴寂等，又撰定《贞观律》。至永徽初，敕长孙无忌等，共撰定律、令、格、式旧制，遂分解疏义，勒成十二卷，是为《永徽律》。其篇目：\n\n一曰名例，二曰卫禁，三曰职制，四曰户婚，五曰厩库，六曰擅兴，七曰贼盗，八曰斗讼，九曰诈伪，十曰杂律，十一曰捕亡，十二曰断狱。\n\n凡五百条，并令疏义，颁于天下。逮乎神龙，止删改格、式。太极元年，又诏删定旧格、式、律、令。至开元初，又令删定《开元律》。然则律、令、格、式，其来尚矣。",

  "lawText": "天、地、人三才确立，宇宙间的万事万物也就随之确立。在一切有生命、有智慧的生物钟，人是最尊贵的。没有一个国家不是依靠百姓而设立君主和官吏，通过政令教化来施行刑法的。德礼为政教之本，刑罚为政教之用。如果有人放纵私欲、愚昧无知，或者心智蒙昧而犯下罪过，大则扰乱天下，小则破坏各种规章制度。因此，国家必须建立完善的法律制度，以刑止刑，以杀止杀。大唐皇帝凭先皇巩固的基业，英明的声威践行先圣踪迹，施恩泽于万物，宽刑罚于百姓。为明确犯罪行为，统一刑罚尺度，由皇帝敕令，经宰辅台省编撰制定本法，施行于全国。"

  "srcText": "名例者，名谓五刑之罪名，例谓五刑之体例。律之篇目，以此为先。故曰名例律。",
  "bodyText": "名例是律典的第一章，作为总则，统领整部律典。名者，五刑之罪名；例者，五刑之体例。“名”意为“命名”，“例”意为“比例”，是命名各篇刑罚之名称，确定各篇刑罚适用的凡例。刑罚由犯罪而确定，犯罪事实因犯罪行为而产生，刑罚等级一旦确定，就随之施加相应的刑罚。设置总则，就有了处置犯罪的标准，因此名例律是律典的第一篇。\n\n> 名例的历史发展\n\n名例律作为总则置于律典篇首并非当然的。\n\n秦国的《法经》共六篇（盗、贼、网、捕、杂、具），作为总则的“具法”是最后一篇。汉《九章律》共九篇（盗、贼、网、捕、杂、具、户、兴、厩），在《法经》六篇的基础上直接增加三篇，导致作为总则的“具律”列于中篇。《曹魏律》将“具律”改为“刑名”，调整到第一篇的位置。《晋律》从“刑名”中分出一篇“法例”，“刑名律”和“法例律”共同作为总则，首创两篇总则的体例。后来南朝的宋、齐、梁及北魏制定的法律都沿袭了这种作法。直到北齐制律，将“刑名”和“法例”两篇合为“名例”一篇，总则恢复一篇体例。隋朝沿袭之，而本朝沿袭隋朝。",
  "lawText": ""

  "bodyText": "刑名，又称刑罚，是刑法中的重要内容，分为主刑和附加刑。本法第一条至第五条规定了唐律的刑罚体系。\n\n> 刑罚理论\n\n主刑又称基本刑，是附加刑的对称。主刑是对罪犯适用的主要刑罚方法。\n\n根据惩罚手段的不同，可以将刑罚分为生命刑、自由刑、肉刑、身体刑、耻辱刑、财产刑等。\n\n1、生命刑，也称为死刑，是剥夺罪犯生命的刑罚。死刑是最为严厉的刑罚手段。\n\n2、自由刑，是剥夺罪犯人身自由的刑罚，通常还需要服劳役，如徒刑、流刑、城旦春等。\n\n3、肉刑，是施加于罪犯肉体并使之残疾的刑罚，如劓刑、剕刑、宫刑等。\n\n4、身体刑，是施加于罪犯肉体使之承受暂时性痛苦的刑罚，如笞刑、杖刑、鞭刑等。\n\n5、耻辱刑，是对罪犯人格进行羞辱的刑罚，如墨刑、髡刑、耐刑等。\n\n6、财产刑，是剥夺罪犯财产的刑罚，如赀刑等。\n\n> 刑罚的历史发展\n\n>> 周\n\n周的刑罚主要有墨（黥）、劓、剕（也称刖）、宫、大辟，亦形成五刑体系，称为“旧五刑”。\n\n墨刑，也称黥[qíng]刑，在罪犯脸上刺字染黑。墨刑虽然不会给人造成肉体上的痛苦，但会极大地损害人的尊严，将犯过罪的人与普通人区别开来，是一种耻辱刑。\n\n劓[yì]刑，割掉罪犯的鼻子，是一种肉刑。\n\n剕[fèi]刑，也称刖[yuè]刑，斩足，是一种肉刑。\n\n宫刑，男子去势，女子幽闭，是一种肉刑。\n\n大辟，是死刑的统称。大辟作为旧五刑最终的刑罚，是一种生命刑。\n\n>> 秦\n\n秦朝大抵沿用旧五刑体系，同时增加了大辟的种类，有凿颠、抽胁、锲烹、车裂等。\n\n>> 汉\n\n汉初，高祖与父老约法三章，杀人者死，伤人及盗抵罪，余悉除去秦法。但大辟有夷三族之令，当族者皆先黥、劓、斩左右趾，笞杀之，枭其首，菹骨肉於其市，诽谤、罟诅又先断其舌，谓之“具五刑”。\n\n汉文帝因缇萦上书事件，废除肉刑，命丞相、御史定律曰：\"诸当完者，为城旦春；当黥者，髡钳为城旦春；当劓者，笞三百；当斩左趾者，笞五百；当斩右趾及杀人先自告及吏坐受赃枉法，守县官财物而即盗之、已论而复有笞罪者，皆弃市。罪人狱已决，完为城旦春；满三岁，为鬼薪白粲：鬼薪白粲一岁，马隶臣、妾；隶臣、妾一岁，免为庶人。鬼薪白粲满三岁为隶臣、妾，隶臣、妾满二岁为司寇，司寇一岁及作如司寇二岁皆免为庶人。其亡逃及有罪耐已上，不用此令。”文帝轻刑化改革在执行过程中出现了巨大的偏差，名为轻刑，实则死刑。如将斩右趾改为弃市，实际上将肉刑加重为了死刑；斩左趾改为笞五百，劓改为笞三百，罪犯常常在执行过程中死亡。\n\n汉景帝时期，进一步轻刑化改革，笞五百改为笞三百，笞三百改为笞二百。后认为刑罚仍然过重，又减笞三百为笞二百，笞二百为笞一百。\n\n>> 曹魏\n\n《曹魏律》依古义，制为五刑，其大辞有三，髡刑有四，完刑、作刑各三，赎刑十一，罚金六，杂抵罪七，凡三十七名。\n\n>> 晋\n\n大辟分为三等：枭、斩、弃市。\n\n髡刑分为四等：髡钳五岁刑，笞二百；四岁刑；三岁刑；二岁刑。\n\n>> 梁\n\n梁朝的刑名之制，加《晋律》一岁刑，半岁刑，百日刑，鞭杖二百，鞭杖一百，鞭杖五十、三十、一十之差；又加杖八等之差。其鞭有制鞭、法鞭、常鞭三等之差：制鞭，生革廉成；法鞭，生革去廉；常鞭，熟靻不去廉。杖有大杖、法杖、小杖，皆用生荆。其犯劫皆斩；会赦降死者，黵面为劫\"字，髡钳，补冶锁士终身。\n\n>> 北齐\n\n北齐的刑罚分为死刑、流刑、徒刑、鞭刑、杖刑，已初步形成了新五刑体系。\n\n死刑分为四等：轘、枭首、斩、绞。\n\n流刑，首先鞭、笞各一百，随后髡之，投边裔。根据距离分等，以六年为限。\n\n徒刑分为五等：五年、四年、三年、二年、一年。徒刑需各加鞭一百，徒五年的又加笞八十，徒四年的加笞六十，徒三岁的加笞三十，徒二年的加笞二十。\n\n鞭刑分为五等：一百、八十、六十、五十、四十。\n\n杖刑分为三等：三十、二十、一十。\n\n>> 北周\n\n北周的刑罚分为杖刑、鞭刑、徒刑、流刑、死刑，亦构成五刑体系，\n\n杖刑分为五等：十、二十、三十、四十、五十。\n\n鞭刑分为五等：六十，七十、八十、九十、一百。\n\n徒刑分为五等：徒一年，鞭六十，笞十；徒二年，鞭七十，笞二十；徒三年，鞭八十，笞三十；徒四年，鞭九十，笞四十；徒五年，鞭一百，笞五十。\n\n流刑分为五等：流二千五百里，鞭一百、笞六十；流三千里，鞭一百一十、笞七十；流三千五百里，鞭一百二十、笞八十；流四千里，鞭一百三十、笞九十；流四千五百里，鞭一百四十、答一百。以六年为限。\n\n死刑分为五等：罄、绞、斩、枭、裂。\n\n> 五刑体系\n\n本法规定的主刑有笞刑、杖刑、徒刑、流刑、死刑共五种，因此也称为“五刑”。\n\n唐律的主刑有以下特点：\n（一）笞、杖、徒、流、死是主刑的五个种类，每种主刑还分为若干等级，从轻到重排列共形成二十等。最轻的一等是笞一十，最重的一等是斩。\n（二）主刑根据犯罪情节可以加减等。在加等和减等时，根据二十等依次加减，五刑之间没有不可逾越的界限。例如，杖刑可以加到徒刑，徒刑可以减到杖刑。而死刑和流刑的加减等较为特殊，二等死刑减一等均减为流三千里，三等流刑减一等均减为徒三年。\n（三）律典还规定了每等刑罚对应的赎铜标准。需要注意的是，绝非允许任意通过赎铜来免予刑罚处罚，只有依法适用赎铜的情形，才允许以赎铜抵刑。\n（四）五刑包括了身体刑（笞刑、杖刑）、自由刑（徒刑、流刑）和生命刑（死刑），相较于古代的刑罚，没有肉刑和耻辱刑，更为文明和进步。",
  "lawText": ""

  "srcText": "第一　答刑五　笞一十。（赎铜一斤。）笞二十。（赎铜二斤。）笞三十。（赎铜三斤。）笞四十。（赎铜四斤。）笞五十。（赎铜五斤。）\n\n【疏】议曰：笞者，击也，又训为耻。言人有小愆，法须惩诫，故以捶挞以耻之。汉时笞则用竹，今时则用楚。故《书》云：“扑作教刑。”即其义也。汉文帝十三年，太仓令淳于意女缇萦上书，文帝感其孝诚，遂除肉刑，当劓者笞三百，当斩左趾者笞五百。然多笞或至死。至景帝元年，减笞五百为三百，笞三百为二百。中六年，又减笞三百为二百，笞二百为一百。又定棰令，以竹为之，长三尺，大头二分，小头一分半。当笞笞臀，当笞笞背。笞者，捶也。其今之楚，与汉大同小异。名笞刑者，以法为训，故云笞刑。",
  "bodyText": "本条规定了最轻一类的主刑——笞刑。笞刑分为五等，从笞一十至笞五十，以十为等差。本条还规定了笞刑各等的赎铜标准，最轻的笞一十需赎铜一斤，最重的笞五十需赎铜五斤，以一斤为等差。\n\n笞[chī]，意思为击打，训为“耻”，解释为羞辱。笞刑是一种肉刑。汉代的笞杖以竹制，本朝用荆条，规格为大头直径两分七厘，小头直径一分七厘。笞刑执行的规范要求，荆条只允许抽打在罪犯的臀部，执行过程中不得更换行刑者。",

var docMap = {};
documents.forEach(function(doc) { docMap[doc.path] = doc; });

function escapeHtml(text) {
    var div = document.createElement('div');
    div.appendChild(document.createTextNode(text));
    return div.innerHTML;
}

function renderContent(text) {
    if (!text) return '';
    return text.split('\n').map(function(line) {
        line = line.trim();
        if (!line) return '';
        var m = line.match(/^(>+)\s*(.*)/);
        if (m) {
            var level = m[1].length;
            return '<h' + level + '>' + escapeHtml(m[2]) + '</h' + level + '>';
        }
        return '<p>' + escapeHtml(line) + '</p>';
    }).join('\n');
}

function renderDoc(path) {
    var doc = docMap[path];
    if (!doc) return;

    var html = '<article><h2>' + escapeHtml(doc.title) + '</h2>';
    if (doc.lawText) html += '<section class="law-text"><h3>条文</h3>' + renderContent(doc.lawText) + '</section>';
    if (doc.bodyText) html += '<section class="body-text"><h3>正文</h3>' + renderContent(doc.bodyText) + '</section>';
    if (doc.srcText) html += '<section class="src-text"><h3>原文</h3>' + renderContent(doc.srcText) + '</section>';
    html += '</article>';

    document.getElementById('content').innerHTML = html;
    document.title = doc.title + ' - 《唐律疏议》的理解与适用';

    document.querySelectorAll('.sidebar a').forEach(function(a) {
        a.classList.toggle('active', a.getAttribute('href') === '#' + path);
    });
}

function navigate() {
    var hash = location.hash;
    if (!hash || hash.length < 2) return;
    var path = decodeURIComponent(hash.slice(1));
    if (docMap[path]) renderDoc(path);
}

// Sidebar click: update hash and render, without browser navigating away
document.querySelectorAll('.sidebar a').forEach(function(a) {
    a.addEventListener('click', function(e) {
        e.preventDefault();
        var path = this.getAttribute('href').slice(1);
        history.pushState(null, '', '#' + path);
        renderDoc(path);
    });
});

// Back/forward navigation
window.addEventListener('popstate', function() {
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var path = decodeURIComponent(hash.slice(1));
        if (docMap[path]) renderDoc(path);
    } else {
        document.getElementById('content').innerHTML = '<h2>欢迎</h2><p>《唐律疏议》是中国现存最完整、最早的一部封建法典。请从左侧目录选择篇章阅读。</p>';
        document.title = '《唐律疏议》的理解与适用';
        document.querySelectorAll('.sidebar a').forEach(function(a) { a.classList.remove('active'); });
    }
});

// Initial load
navigate();
</script>

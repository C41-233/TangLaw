<div class="container"><header><h1>第二百五十四条之一 主人</h1></header><div class="law"><p>本法称“主人”的，同籍良口中有资格分家产者同。
</p></div><p>本条对“主人”的概念进行了扩大。
</p><p>部曲、奴婢的支配者称“主人”。本条对刑法中的“主人”进行了扩大，将主人同一户籍中所有有资格分家产的良人都视为主人。
</p><p>良口，即良人，说明其他部曲、奴婢，即使处于管理者身份，也不属于主人。
</p><p>有资格分家产者，说明媵、妾等人均不属于主人。</p><div class="src"><p>但同籍良口以上，合有財分者，並皆為「主」。其媵及妾，在令不合分財，並非奴婢之主。
</p></div></div>

<div class="container"><header><h1>第条 346 告尊长罪</h1></header><div class="law"><p>告期亲尊长、外祖父母、夫、夫之祖父母的，徒二年。所告之罪重于徒二年的，减所告之罪一等。</p><p>告大功尊长的，减前款的规定一等；告小功、缌麻尊长的，减前款的规定二等。</p></div></div>

<div class="container"><header><h1>第条 122.1 对抗制使罪</h1></header><div class="law"><p>对抗制使的，绞。</p><p>因私事争斗的，不适用前款的规定。</p></div><p>本条规定了对抗制使罪，属于十恶之罪中的大不敬。</p><h2>罪状</h2><p>对抗制使，即在制使履行公务时，不接受制命，口出抗拒之言。犯本罪的，处绞刑。</p><word value="制使" /><p>本条第二款作了提示性规定。制使只有在履行公务时，才具有制使身份。如双方因私事争斗，并非抗拒公务的，不适用本罪，可适用殴打官长罪（</p><link>312</link><p>）、詈骂官长罪（</p><link>312.1</link><p>）。此外，虽因公事争斗，但并未抗拒制命的执行的，也不构成本罪。</p><h2>令史</h2><p>根据</p><link>51.1</link><p>的规定，对抗太皇太后、皇太后、皇后、皇太子令使的，减一等，即流三千里。</p></div>

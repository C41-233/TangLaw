<div class="container"><header><h1>第条 329.1 殴杀子孙罪</h1></header><div class="law"><p>子孙违犯教令，祖父母、父母殴杀的，徒一年半；用刃的，徒二年。故杀的，加一等。</p><p>嫡母、继母、慈母、养父母犯前款罪的，加一等。</p><p>过失杀子孙的，不坐。</p></div></div>

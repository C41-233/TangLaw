<div class="container"><header><h1>第四十七条之一 部曲、部曲妻、客女</h1></header><div class="law"><p>本法称“部曲”的，部曲妻、客女同。
</p></div><p>本条规定了部曲的含义。
</p><p>部曲妻、客女在法律上与部曲的身份并不等同，但在刑法中将其视为同一种身份。因此，凡律典中对部曲的规定，都同样适用于部曲妻和客女。
</p><div class="word"><div class="world-title">部曲</div><div class="word-content"><p>属贱籍的一种，仅限男性，其身份高于奴婢。户籍随主人，无独立户籍。通常是为贵族、官僚或地主服役，从事生产、守卫或随从等工作。
</p><p>此外，根据<a href="47.1.html" class="link-article">第四十七条之一</a>的规定，有关部曲的规定，同样适用于部曲妻和客女。</p></div></div><div class="word"><div class="world-title">客女</div><div class="word-content"><p>属贱籍的一种，仅限女性，身份等同于“部曲”。
</p><p>根据<a href="47.1.html" class="link-article">第四十七条之一</a>，客女适用有关部曲的规定。</p></div></div></div>

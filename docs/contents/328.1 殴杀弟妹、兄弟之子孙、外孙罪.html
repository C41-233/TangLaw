<div class="container"><header><h1>第条 328.1 殴杀弟妹、兄弟之子孙、外孙罪</h1></header><div class="law"><p>殴杀弟妹、兄弟之子孙、外孙的，徒三年；用刃的，或者故杀的，流二千里。过失杀的，不坐。</p><p>对兄弟之曾、玄孙犯前款罪的，依照本服的规定处理。</p></div><p>本条规定了殴杀、故杀卑幼罪，属十恶之罪中的不睦。</p><h2>亲属</h2><p>本罪涉及的卑幼亲属有弟妹、兄弟之子孙、外孙。</p><h5>弟妹</h5><word value="弟妹" /><h5>兄弟之子孙</h5><word value="兄弟之子孙" /><p>兄弟之子为期亲，兄弟之孙为小功亲。根据</p><link>52</link><p>的规定，称“孙”的，曾孙、玄孙同。但是，本条第二款特别将兄弟之曾孙、玄孙排除，因为服制确实已经较远，不适宜适用期亲和小功的制度，而要适用其本服的规定，即兄弟之曾孙适用缌麻亲的规定，兄弟之玄孙适用袒免亲的规定。</p><h5>外孙</h5><word value="外孙" /></div>

<div class="container"><header><h1>第条 47.1 部曲、部曲妻、客女</h1></header><div class="law"><p>本法称“部曲”的，部曲妻、客女同。</p></div><p>本条规定了部曲的含义。</p><p>部曲妻、客女在法律上与部曲的身份并不等同，但在刑法中将其视为同一种身份。因此，凡律典中对部曲的规定，都同样适用于部曲妻和客女。</p><word value="部曲" /><word value="客女" /></div>

<div class="container"><header><h1>第条 53 反坐、依论、与同罪、准论、以论</h1></header><div class="law"><p>本法称“反坐”、“依……论”、“与……同罪”的，罪止绞；称“准……论”的，罪止流三千里。</p><p>本法称“反坐”、“依……论”、“与……同罪”、“准……论”的，不适用除名、免官、加倍征赃、监临主守加等、加役流的规定。</p><p>本法称“以……论”的，依照其规定定罪处罚。</p></div></div>

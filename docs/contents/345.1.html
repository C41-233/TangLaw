<title>第三百四十五条之一 告尊长的特别规定</title>
</head>
<body>
<div class="container"><header><h1>第三百四十五条之一 告尊长的特别规定</h1></header><div class="law"><p>缘坐之罪，不适用本法第三百四十五条和第三百四十六条的规定。
</p><p>谋反、谋大逆、谋叛的，不适用本法第三百四十五条、第三百四十六条和第三百四十七条的规定。
</p></div><div class="src"><p>謂非緣坐之罪及謀叛以上而故告者。下條準此。
</p><p>【疏】議曰：注云「謂非緣坐之罪」，緣坐謂謀反、大逆及謀叛以上，皆為不臣，故子孫告亦無罪，緣坐同首法，故雖父祖聽捕告。若故告餘罪者，父祖得同首例，子孫處以絞刑。下條準此者，謂告期親尊長，情在於惡，欲令入罪而故告之，故云「準此」。若因推劾，事不獲免，隨辯注引，不當告坐。
</p></div></div>

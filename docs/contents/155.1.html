<title>第一百五十五条之一 非法过继子孙罪</title>
</head>
<body>
<div class="container"><header><h1>第一百五十五条之一 非法过继子孙罪</h1></header><div class="law"><p>祖父母、父母将子孙非法过继给他人的，徒二年。子孙不坐。
</p></div><div class="src"><p>若祖父母、父母令別籍及以子孫妄繼人後者，徒二年；子孫不坐。
</p><p>【疏】議曰：若祖父母、父母處分，令子孫別籍及以子孫妄繼人後者，得徒二年，子孫不坐。但云「別籍」，不云「令其異財」，令異財者，明其無罪。
</p></div></div>

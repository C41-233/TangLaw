<div class="container"><header><h1>第条 30.2 老小病残犯罪之三</h1></header><div class="law"><p>年九十以上、七岁以下者犯罪的，不论。但是，缘坐没为奴婢的除外。</p><p>教唆前款规定之人犯罪的，处罚教唆者。应当征赃的，向受赃者征收。</p></div></div>

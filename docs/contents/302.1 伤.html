<div class="container"><header><h1>第条 302.1 伤</h1></header><div class="law"><p>本法所称“伤”，是指出血或者骨节差跌。</p></div><p>本条明确了律典中“伤”的含义。</p><p>伤，是指出血或者骨节差跌。只要致人出血，不论伤处多少，见血为伤。骨节差跌，是指虽不见血，有骨节脱臼突出。</p><word value="伤" /><p>是否致伤通常影响量刑。例如，根据第三百零二条的规定，斗殴人未致伤的，处笞四十；致伤的，处杖六十。根据第二百五十三条的规定，谋杀缌麻以上尊长的，流二千里；致伤的，绞。</p></div>

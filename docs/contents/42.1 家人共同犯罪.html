<div class="container"><header><h1>第条 42.1 家人共同犯罪</h1></header><div class="law"><p>家人共同犯罪的，只坐家长。家长依法不坐的，坐次家长。</p><p>侵犯财产或者致人损伤的，不适用前款的规定。</p><p>第一款所称“家长”，是指男性尊长。</p></div></div>

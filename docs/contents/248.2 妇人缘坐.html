<div class="container"><header><h1>第条 248.2 妇人缘坐</h1></header><div class="law"><p>妇人年六十以上或者废疾的，免除缘坐。</p></div><p>凡是律典中适用缘坐妇女在缘坐范围内，年六十以上或者废疾的，都免除缘坐。</p><p>注意，免除缘坐是完全免除刑罚，无须赎铜。</p><word value="废疾" /><word value="缘坐" /></div>

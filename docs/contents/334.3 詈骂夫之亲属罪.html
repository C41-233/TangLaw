<div class="container"><header><h1>第条 334.3 詈骂夫之亲属罪</h1></header><div class="law"><p>妻詈骂夫之期亲以下、缌麻以上尊长的，减夫犯一等。</p><p>妾犯前款罪的，依照夫犯的规定处理。</p></div></div>

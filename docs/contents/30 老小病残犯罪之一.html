<div class="container"><header><h1>第条 30 老小病残犯罪之一</h1></header><div class="law"><p>年七十以上、十五以下或者废疾者，犯流罪以下的，赎铜。</p><p>犯加役流、反逆缘坐流、会赦犹流之罪的，不适用前款的规定。但是，至配所免居作。</p></div></div>

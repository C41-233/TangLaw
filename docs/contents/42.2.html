<body>
<div class="container"><header><h1>第四十二条之二 监临主守官共同犯罪</h1></header><div class="law"><p>监临主守官参与共同犯罪的，以监临主守官为首犯。
</p></div><p>本条是对监临主守官参与的共同犯罪的特殊规定。
</p><p>在有监临主守官参与的共同犯罪中，不考虑提出犯罪动议者，一律以监临主守官为首犯，其他人为从犯。</p><div class="src"><p>即共監臨主守為犯，雖造意，仍以監主為首，凡人以常從論。
</p><p>【疏】議曰：「監臨主守」，具如後解。假有外人發意，共左藏官司、主典盜庫絹五疋，雖是外人造意，仍以監主為首，處徒二年；外人依常盜從，合杖一百。
</p></div></div>

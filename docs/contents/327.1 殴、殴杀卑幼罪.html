<div class="container"><header><h1>第条 327.1 殴、殴杀卑幼罪</h1></header><div class="law"><p>尊长殴卑幼致折伤的，缌麻，减凡人一等；小功、大功，依次减一等；致死的，绞。</p><p>殴杀从父弟妹、从父兄弟之子孙的，流三千里；用刃的，或者故杀的，绞。</p></div></div>

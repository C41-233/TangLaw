<div class="container"><header><h1>第条 271 窃盗御宝罪</h1></header><div class="law"><p>窃盗御宝的，绞。</p></div><p>本条规定了窃盗御宝罪，属于十恶之罪中的大不敬。</p><word value="御宝" /><p>本罪的法定刑规定如下：
（1）窃盗皇帝八宝的，处绞刑。
（2）窃盗太皇太后、皇太后、皇后御宝的，也处绞刑。
（3）窃盗皇太子、皇太子妃御宝的，处流三千里。</p></div>

<div class="container"><header><h1>第条 334.1 殴伤、殴杀夫之卑属罪</h1></header><div class="law"><p>妻殴伤夫之期亲以下、缌麻以上卑属的，依照夫犯的规定处理；致死的，绞。</p><p>妻殴杀夫之兄弟之子，流三千里；故杀的，绞。</p><p>妾犯前两款罪的，依照凡人的规定处理。</p></div></div>

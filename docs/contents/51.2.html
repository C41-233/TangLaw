<div class="container"><header><h1>第五十一条之二 东宫</h1></header><div class="law"><p>犯皇太子及东宫的，减犯乘舆一等。十恶之罪，依照法律的规定。
</p></div><p>本条是对“东宫”的法律术语解释，旨在补足对“东宫”犯罪的法律适用。
</p><p>东宫，指皇太子，即皇帝确立的储君。刑法中有关对皇帝及宫卫的犯罪，减一等适用对皇太子及宫卫的犯罪。构成十恶之罪的，减一等后仍构成十恶之罪。</p></div>

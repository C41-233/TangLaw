<h2>律文</h2>
<div class="index-text">
<div class="index-text-entry">
<div class="index-title-preamble">序言</div>
<p>天、地、人三才确立，宇宙间的万事万物也就随之确立。在一切有生命、有智慧的生物钟，人是最尊贵的。国家依靠百姓而设立君主和官吏，通过政令教化来施行刑法。德礼为政教之本，刑罚为政教之用。如果有人放纵私欲、愚昧无知，或者心智蒙昧而犯下罪过，大则扰乱天下，小则破坏各种规章制度。因此，国家必须建立完善的法律制度，以刑止刑，以杀止杀。</p>
<p>大唐皇帝凭先皇巩固的基业，英明的声威践行先圣踪迹，施恩泽于万物，宽刑罚于百姓。为明确犯罪行为，统一刑罚尺度，由皇帝敕令，经宰辅台省编撰制定本法，施行于全国。</p>

<div class="container"><header><h1>第条 252.1 吏卒</h1></header><div class="law"><p>本法称“吏卒”的，工户、乐户、公廨户、奴婢同。</p></div><p>本条规定了吏卒的含义。</p><p>吏，指低级吏员，包括流外官和视流外官；卒，指军士、兵士、卫士等。</p><p>工户，指隶属于少府监的从事手工业劳动的贱民。乐户，指隶属于太常寺的职业舞乐贱民。公廨户，泛指户籍不在州县而隶属于受辖官署的官贱民，包括隶属于司农寺的官户、官奴婢等。工户、乐户严格来说也是公廨户。</p><p>奴婢，属贱民的一种，分为官奴婢和私奴婢，地位在部曲之下。</p><word value="吏卒" /><word value="奴婢" /></div>

<div class="container"><header><h1>第条 304.2 刃、兵刃</h1></header><div class="law"><p>本法所称“刃”，是指足以杀人的，有锋刃的武器。</p><p>本法所称“兵刃”，是指弓、箭、刀、矟、矛等有锋刃的兵器。</p></div><p>本条规定了刃和兵刃的含义。</p><p>刃，指足以杀人的，有锋刃的武器。</p><p>兵刃，指弓、箭、刀、矟、矛等有锋刃的兵器。条文中用了“等”字，除明确列举的以外，殳、戟之类兵器，当然也属于兵刃。</p></div>
